<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub | Votre Cinéma Maison</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --primary: #e50914;
            --dark: #141414;
            --light: #ffffff;
        }
        body {
            background-color: var(--dark);
            color: var(--light);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
        }
        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
        }
        .logo { color: var(--primary); font-size: 2rem; font-weight: bold; text-decoration: none; }
        
        .hero {
            height: 70vh;
            display: flex;
            align-items: center;
            padding: 0 5%;
            background: linear-gradient(to right, rgba(0,0,0,0.8), transparent), url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
        }
        .hero-content h1 { font-size: 3.5rem; margin-bottom: 10px; }
        .btn-play {
            background-color: var(--light);
            color: black;
            padding: 10px 25px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        .video-grid {
            padding: 40px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .video-card {
            transition: transform 0.3s;
            cursor: pointer;
        }
        .video-card:hover { transform: scale(1.05); }
        .video-card img { width: 100%; border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">STREAMHUB</a>
        <nav>
            <span>Accueil</span>
            <span style="margin-left: 20px;">Séries</span>
            <span style="margin-left: 20px;">Films</span>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Le Film du Moment</h1>
            <p>Découvrez l'aventure la plus épique de l'année.</p>
            <a href="#player" class="btn-play">▶ Lecture</a>
        </div>
    </section>

    <section class="video-grid">
        <div class="video-card">
            <img src="https://via.placeholder.com/300x450" alt="Film 1">
            <p>Titre du Film 1</p>
        </div>
        <div class="video-card">
            <img src="https://via.placeholder.com/300x450" alt="Film 2">
            <p>Titre du Film 2</p>
        </div>
        </section>

    <div id="player" style="padding: 5% text-align: center;">
        <h2>Lecteur Vidéo</h2>
        <iframe width="80%" height="450" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
    </div>

</body>
</html>
